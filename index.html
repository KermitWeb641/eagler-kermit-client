<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="Play minecraft 1.12 in your browser" />
		<meta name="keywords" content="eaglercraft, minecraft, 1.12, 1.12.2" />
		<title>Eaglercraft 1.12 WASM-GC</title>
		<meta property="og:locale" content="en-US" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Eaglercraft 1.12 WASM" />
		<meta property="og:description" content="Play minecraft 1.12 in your browser" />
		<meta property="og:image" content="favicon.png" />
		<link type="image/png" rel="shortcut icon" href="favicon.png" />
		<style>
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				overflow: hidden;
				background: #000;
			}
			#game_frame {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
			}
			/* Smooth the game's low-resolution canvas when it is scaled up. */
			#game_frame,
			#game_frame * {
				image-rendering: auto !important;
			}
			#kermit-startup {
				position: fixed;
				inset: 0;
				z-index: 2147483646;
				display: grid;
				place-items: center;
				overflow: hidden;
				cursor: pointer;
				background: #18001d;
				touch-action: manipulation;
				user-select: none;
				-webkit-user-select: none;
			}
			#kermit-startup-backdrop {
				position: absolute;
				inset: -28px;
				background: center center / cover no-repeat url("custom-panorama/panorama_0.png");
				filter: blur(15px) brightness(.68) saturate(1.12);
				transform: scale(1.06);
				transition: filter 1.15s ease, opacity 1.15s ease, transform 1.15s ease;
			}
			#kermit-startup-backdrop::after {
				content: "";
				position: absolute;
				inset: 0;
				background: rgba(12, 0, 18, .16);
			}
			#kermit-startup-content {
				position: relative;
				z-index: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: clamp(30px, 7vh, 64px);
				width: 100%;
				transition: opacity .5s ease, transform .5s ease;
			}
			#kermit-startup-icon {
				width: clamp(128px, 22vw, 230px);
				height: auto;
				image-rendering: pixelated;
				pointer-events: none;
				user-select: none;
				-webkit-user-select: none;
				-webkit-user-drag: none;
				filter: drop-shadow(0 10px 28px rgba(0, 0, 0, .62));
				animation: kermit-startup-float 2.6s ease-in-out infinite;
			}
			#kermit-click-prompt {
				margin-top: clamp(-40px, -5vh, -22px);
				color: #fff;
				font: 700 clamp(18px, 2.6vw, 30px)/1.2 Arial, Helvetica, sans-serif;
				letter-spacing: .08em;
				text-transform: uppercase;
				text-shadow: 0 3px 10px #000, 0 0 16px rgba(240, 0, 218, .65);
				animation: kermit-prompt-pulse 1.35s ease-in-out infinite;
				transition: opacity .2s ease, transform .2s ease;
			}
			#kermit-loading-track {
				width: min(440px, 68vw);
				height: 13px;
				padding: 3px;
				border: 2px solid rgba(255, 255, 255, .88);
				background: rgba(0, 0, 0, .6);
				box-shadow: 0 5px 22px rgba(0, 0, 0, .55);
				opacity: 0;
				transform: translateY(8px);
				transition: opacity .25s ease, transform .25s ease;
			}
			#kermit-loading-fill {
				width: var(--kermit-load, 0%);
				height: 100%;
				background: linear-gradient(90deg, #8b00a6, #f000da, #ff69ef);
				box-shadow: 0 0 14px rgba(240, 0, 218, .75);
				transition: width .16s ease-out;
			}
			#kermit-startup.loading {
				cursor: default;
			}
			#kermit-startup.loading #kermit-loading-track {
				opacity: 1;
				transform: translateY(0);
			}
			#kermit-startup.loading #kermit-click-prompt {
				animation: none;
				opacity: 1;
				transform: translateY(0);
				pointer-events: none;
			}
			#kermit-startup.ready {
				pointer-events: none;
				background: transparent;
			}
			#kermit-startup.ready #kermit-startup-backdrop {
				filter: blur(0) brightness(1) saturate(1);
				opacity: 0;
				transform: scale(1);
			}
			#kermit-startup.ready #kermit-startup-content {
				opacity: 0;
				transform: scale(1.035);
			}
			@keyframes kermit-startup-float {
				0%, 100% { transform: translateY(0); }
				50% { transform: translateY(-8px); }
			}
			@keyframes kermit-prompt-pulse {
				0%, 100% { opacity: .65; }
				50% { opacity: 1; }
			}
			@media (prefers-reduced-motion: reduce) {
				#kermit-startup-icon,
				#kermit-click-prompt { animation: none; }
			}
		</style>
	<script type="text/javascript" src="classes.js?v=101"></script>
	<script type="text/javascript" src="kermit-client.js?v=102"></script>
		<script type="text/javascript">
			"use strict";
			window.addEventListener("load", function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
				}else {
					
					// %%%%%%%%% launch options %%%%%%%%%%%%
					
					var relayId = Math.floor(Math.random() * 3);
					window.eaglercraftXOpts = {
						demoMode: false,
						singleThreadMode: false,
						container: "game_frame",
						assetsURI: [
							{ url: "assets.epk", path: "" },
							{ url: "custom-textures.epk?v=93", path: "" }
						],
						localStorageNamespace: "_eaglercraft_1.12",
						worldsDB: "worlds",
						resourcePacksDB: "resourcePacks",
						servers: [
							/* example: { addr: "ws://localhost:8081/", name: "Local test server" } */
						],
						relays: [
							{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
							{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
							{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
						]
					};
					
					// %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
					
					var q = window.location.search;
					if((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
						q = new window.URLSearchParams(q);
						var s = q.get("server");
						if(s) window.eaglercraftXOpts.joinServer = s;
					}
					
					var startup = document.getElementById("kermit-startup");
					var fill = document.getElementById("kermit-loading-fill");
					var startupPrompt = document.getElementById("kermit-click-prompt");
					var bootStartedAt = 0;
					var resourcesLoadedAt = 0;
					var introStarted = false;
					var gamePromise;
					var originalConsoleLog = console.log;
					console.log = function() {
						var message = Array.prototype.join.call(arguments, " ");
						if (message.indexOf("resources from EPKs") !== -1) resourcesLoadedAt = Date.now();
						return originalConsoleLog.apply(console, arguments);
					};

					function startGame() {
						bootStartedAt = Date.now();
						try {
							gamePromise = Promise.resolve(main());
							gamePromise.catch(function(error) {
								console.error("Kermit Client failed to start:", error);
							});
						} catch (error) {
							console.error("Kermit Client failed to start:", error);
						}
					}

					function unlockGameFromTap() {
						var gameFrame = document.getElementById("game_frame");
						var gameSurface = gameFrame && (gameFrame.querySelector("canvas") || gameFrame.firstElementChild);
						if (gameSurface && typeof gameSurface.focus === "function") {
							try { gameSurface.focus({ preventScroll: true }); } catch (ignored) { gameSurface.focus(); }
						}

						var keyOptions = {
							key: " ",
							code: "Space",
							bubbles: true,
							cancelable: true
						};
						var keyDown = new KeyboardEvent("keydown", keyOptions);
						var keyUp = new KeyboardEvent("keyup", keyOptions);
						try {
							Object.defineProperty(keyDown, "keyCode", { get: function() { return 32; } });
							Object.defineProperty(keyDown, "which", { get: function() { return 32; } });
							Object.defineProperty(keyUp, "keyCode", { get: function() { return 32; } });
							Object.defineProperty(keyUp, "which", { get: function() { return 32; } });
						} catch (ignored) {}
						window.dispatchEvent(keyDown);
						window.dispatchEvent(keyUp);
					}

					function beginIntroLoading() {
						if (introStarted || !startup) return;
						introStarted = true;
						startupPrompt.textContent = "Kermit Client";
						startup.classList.add("loading");
						startGame();
						unlockGameFromTap();

						var now = bootStartedAt;
						var timer = window.setInterval(function() {
							var elapsed = Date.now() - now;
							var ratio = Math.min(1, elapsed / 14000);
							var eased = 1 - Math.pow(1 - ratio, 2.4);
							var readyFromResources = resourcesLoadedAt > 0 &&
								Date.now() >= Math.max(bootStartedAt + 9000, resourcesLoadedAt + 3500);
							var readyFromTimeout = elapsed >= 20000;
							var finished = readyFromResources || readyFromTimeout;
							var percent = finished ? 100 : Math.min(96, 4 + eased * 92);
							fill.style.setProperty("--kermit-load", percent.toFixed(1) + "%");

							if (finished) {
								window.clearInterval(timer);
								window.setTimeout(function() {
									startup.classList.add("ready");
									window.setTimeout(function() {
										startup.remove();
									}, 1250);
								}, 260);
							}
						}, 50);
					}

					startup.addEventListener("pointerup", beginIntroLoading, { once: true });
					startup.addEventListener("keydown", function(event) {
						if (event.code === "Enter" || event.code === "Space") beginIntroLoading();
					});
					
				}
			});
		</script>
	</head>
	<body>
		<div id="game_frame"></div>
		<div id="kermit-startup" role="button" tabindex="0" aria-label="Start Kermit Client">
			<div id="kermit-startup-backdrop"></div>
			<div id="kermit-startup-content">
				<img id="kermit-startup-icon" src="kermit-startup-icon.png" alt="Kermit Client" draggable="false" />
				<div id="kermit-click-prompt">Click to Play</div>
				<div id="kermit-loading-track" aria-hidden="true">
					<div id="kermit-loading-fill"></div>
				</div>
			</div>
		</div>
	</body>
</html>
